<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYSM INDIA Quiz</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css">
    
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161e;
            --accent-primary: #00f2ff; /* Cyan */
            --accent-secondary: #7000ff; /* Purple */
            --correct: #39ff14; /* Neon Green */
            --correct-sec: #089A49; /* Neon Green */
            --wrong: #ff3131; /* Neon Red */
            --skip: #e9ad00; /* Neon  */
            --text: #ffffff;
            --correct-bg: #e1ffd9;
            --wrong-bg: #ffd8d8;
            --skip-bg: #fff7e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: scroll;
        }

        /* 9:16 Container */
        #app-container {
            width: 90vw;
            height: 700px;
            max-width: 56.25vh; /* Maintains 9:16 ratio on desktop */
            background: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            color: var(--text);
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Header & Progress */
        header {
            padding: 20px 15px 10px;
            text-align: center;
        }
        
        .headerBrand{
          background-color: #0D6EFD;
          padding: 8px 10px;
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          gap: 3px;
          
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            
        }

        .tagline {
            font-size: 0.7rem;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .progress-wrapper {
            margin-top: 10px;
            width: 100%;
        }

        .progress-text {
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            height: 12px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--correct-sec));
            background-size: 200% 200%; /* Smooth animation */
            animation: rotateGradient 3s linear infinite; /* Continuous rotation */
            transition: width 0.4s ease;
            box-shadow: 0 0 0px var(--accent-primary);
            border-radius: 10px;
        }
        
        @keyframes rotateGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Chapter Name */
        #chapter-display {
            background: rgba(112, 0, 255, 0.18);
            margin: 20px 0;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text);
            border-bottom: 3px solid var(--accent-secondary);
        }

        /* Main Quiz Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px;
            position: relative;
        }

        .question-box {
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            margin-top: -100px;
        }

        /* Timer */
        .timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -70px 0 30px 0;
        }

        #timer-display {
            width: 50px;
            height: 50px;
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            /* grid-template-columns: 1fr 1fr; */
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        /* Mobile / small screens: 1 column */
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr; /* Single column for mobile */
            }
        }
        .option-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        .option-btn:active { transform: scale(0.95); }

        .option-btn.correct {
            border-color: var(--correct);
            box-shadow: 0 0 0px var(--correct);
            background: rgba(57, 255, 20, 0.15);
        }

        .option-btn.wrong {
            border-color: var(--wrong);
            box-shadow: 0 0 0px var(--wrong);
            background: rgba(255, 49, 49, 0.15);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Footer/Next */
        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #next-btn {
            margin: 0;
            padding: 0;
            width: 220px;
            height: 40px;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 30px;
            padding: 5px 20px!important;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            visibility: hidden;
            box-shadow: 0 3px 8px rgba(0,242,255,0.4);
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #next-btnn:active{
            transform: scale(0.95);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }

        /* Results Screen */
        #result-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }
        
        .quizDone{
          width: 100%;
          padding: 15px;
          border-radius: 5px;
          margin-bottom: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 10px;
        }
        
        .quizDone .tickIconBox {
          width: 40px;
          height: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 50%;
          background: var(--text);
          position: relative;
        }
        .quizDone .tickIconBox i {
          margin: 0;
          padding: 0;
          font-size: 50px;
          color: var(--correct-sec);
        }
        .quizDone p {
          margin: 0!important;
          padding: 0!important;
          font-size: 1.4rem;
          color: var(--text);
          font-weight: 800;
          text-transform: uppercase;
        }
        
        .score-container {
            width: 200px; 
            height: 200px;
            border-radius: 50%;
            border: 8px solid var(--accent-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px var(--accent-primary);
        }

        #score-val { font-size: 2rem; font-weight: 800; }

        .score-box {
            position: absolute;
            top: 15px; right: 15px;
            font-weight: bold;
            color: var(--accent-primary);
        }
        
        
        
        
        .score-container {
            width: 250px;
            height: 350px;
            border-radius: 20px; /* circle से card style */
            border: 2px solid var(--accent-primary);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 5px var(--accent-primary);
            padding: 25px 15px;
        }
        
        /* Result items */
        .result-item {
          font-size: 0.95rem;
          width: 100%;
          border-radius: 5px;
          overflow: hidden;
        }
        
        .result-item .dashboard-title{
          text-transform: uppercase;
          font-size: 1.3rem;
          font-weight: 700;
        }
        .result-item p {
          font-weight: bold;
          font-size: 18px;
          color: #eee; /* Subtle gray for labels */
        }
        /* --- Table Styling for Result Screen --- */
        /* --- Optimized Table Styling --- */
        .score-container table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto; /* Isse columns ki width lock ho jati hai */
        }
        
        .score-container th {
            width: 75%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 8px;
            vertical-align: middle;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        .score-container th i {
          font-size: 0.8rem;
          margin-right: 5px;
        }
        
        .score-container td {
            width: 25%;
            text-align: right;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 6px 8px;
            vertical-align: middle;
            font-variant-numeric: tabular-nums; /* Numbers ko align rakhta hai */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        
        /* Accuracy section ko thoda saaf dikhane ke liye */
        .percent-box {
            width: 100%;
            padding-top: 12px;
            margin-top: 8px;
            text-align: center;
        }
        
        #percent-val {
            font-size: 0.95rem;
            font-weight: 700;
            display: block;
            line-height: 1.4;
        }
        
               
       
        
        /* Colors */
        .result-item.total { color: #0D6EFD; background: #e3f2fd; }
        .result-item.right { color: var(--correct-sec); background: var(--correct-bg); }
        .result-item.wrong { color: var(--wrong); background: var(--wrong-bg); }
        .result-item.skip { color: var(--skip); background: var(--skip-bg); }
        
        /* Percentage */
        .percent-box {
            margin-top: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-primary);
        }
        
        
        
        
        #restart-btn {
          margin: 0;
          padding: 0;
          width: 220px;
          height: 40px;
          background-color: #0D6EFD;
          color: #fff;
          font-size: 0.8rem;
          padding: 5px 20px; 
          border-radius: 30px;
          outline: none;
          border: none; 
          font-weight: bold;
          transition: transform 0.3s ease ;
          display: flex;
          align-items: center;
          justify-content: center;
          
        }
        #restart-btn:hover{
          background-color: #0047ab;
          transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="app-container">
   <div class="headerBrand">
      <div class="brand">MYSM INDIA</div>
      <div class="tagline">— Learn, Grow & Shine —</div>
    </div>
      
    <header>
        <div class="progress-wrapper">
            <div class="progress-text">
                <span id="q-counter">Question 1 / 15</span>
                <span id="score-text">Score : 0</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
    </header>

    <div id="chapter-display"></div>

    <main id="quiz-main">
        <div class="question-box">
            <h2 id="question-text">प्रश्न यहाँ दिखेगा</h2>
        </div>

        <div class="timer-container">
            <div id="timer-display">15</div>
        </div>

        <div class="options-grid" id="options-container">
          <!-- Yaha Option aata hai -->
        </div>

        <div class="footer">
            <button id="next-btn" onclick="nextQuestion()">NEXT</button>
        </div>
    </main>
    
    
    
    <div id="result-screen">
        <div class="quizDone">
            <div class="tickIconBox fa-beat"><i class="fa-solid fa-circle-check"></i></div>
            <p>QUIZ COMPLETED!</p>
        </div>
    
        <div class="score-container">
            <div class="result-item finalResultHeading">
              <h2 class="dashboard-title">Result Dashboard</h2>
            </div>
            
            <div class="result-item total">
              <table>
                <tr>
                  <th><i class="fa-solid fa-clipboard-list"></i>Total Questions</th>
                  <td id="total-count">0</td>
                </tr>
              </table>
            </div>

            <div class="result-item right">
              <table>
                <tr>
                  <th><i class="fa-solid fa-circle-check"></i>Right Answer</th>
                  <td id="right-count">0</td>
                </tr>
              </table>
            </div>
            <div class="result-item wrong">
              <table>
                <tr>
                  <th><i class="fa-solid fa-circle-xmark"></i>Wrong Answer</th>
                  <td id="wrong-count">0</td>
                </tr>
              </table>
            </div>

            <div class="result-item skip">
              <table>
                <tr>
                  <th><i class="fa-solid fa-stopwatch"></i>No Answered</th>
                  <td id="skip-count">0</td>
                </tr>
              </table>
            </div>
            
            <div class="percent-box">
                <span id="percent-val">0%</span>
            </div>
        </div>
    
        <button id="restart-btn" onclick="location.reload()">RESTART QUIZ</button>
    </div>

</div>

<script>
// Chapter Name Diaplay
const chapter_Name = "अध्याय : सौरमंडल (Solar System)";
      document.getElementById("chapter-display").innerText = chapter_Name;
// Quiz Data
const quizData = [
  { q: "सौरमंडल में कुल कितने ग्रह हैं?", a: "7", b: "8", c: "9", d: "10", correct: "B" },
  { q: "कौन सा ग्रह सबसे तेज घूमता है (अपनी धुरी पर)?", a: "बृहस्पति", b: "मंगल", c: "शुक्र", d: "पृथ्वी", correct: "A" },
  { q: "कौन सा ग्रह सबसे धीमी गति से घूमता है?", a: "मंगल", b: "बुध", c: "शुक्र", d: "शनि", correct: "C" },
  { q: "सौरमंडल का सबसे ठंडा ग्रह कौन सा है?", a: "शनि", b: "यूरेनस", c: "नेपच्यून", d: "बृहस्पति", correct: "B" },
  { q: "किस ग्रह पर सबसे ज्यादा चंद्रमा (moons) हैं?", a: "बृहस्पति", b: "पृथ्वी", c: "मंगल", d: "शुक्र", correct: "A" },
  { q: "किस ग्रह को Evening Star भी कहा जाता है?", a: "बुध", b: "शुक्र", c: "मंगल", d: "शनि", correct: "B" },
  { q: "कौन सा ग्रह गैस दानव (Gas Giant) नहीं है?", a: "बृहस्पति", b: "शनि", c: "मंगल", d: "नेपच्यून", correct: "C" },
  { q: "किस ग्रह के चारों ओर पतले छल्ले (rings) भी पाए जाते हैं?", a: "बृहस्पति", b: "मंगल", c: "पृथ्वी", d: "शुक्र", correct: "A" },
  { q: "सूर्य से सबसे दूर दूसरा ग्रह कौन सा है?", a: "यूरेनस", b: "शनि", c: "नेपच्यून", d: "बृहस्पति", correct: "A" },
  { q: "किस ग्रह को Ice Giant कहा जाता है?", a: "मंगल", b: "यूरेनस", c: "शनि", d: "बृहस्पति", correct: "B" }
];

// State Variables
let currentIdx = 0;
let score = 0;
let right = 0;
let wrong = 0;
let skipped = 0;

let timeLeft = 15;
let timerId = null;
let canAnswer = true;

// Audio
const tickSound = new Audio('https://www.soundjay.com/buttons/button-40.mp3');
const correctSound = new Audio('https://www.soundjay.com/buttons/button-37.mp3');
const wrongSound = new Audio('https://www.soundjay.com/buttons/button-10.mp3');

// Init
function initQuiz() {
    showQuestion();
}

// Show Question
function showQuestion() {
    canAnswer = true;
    timeLeft = 10;
    document.getElementById('next-btn').style.visibility = 'hidden';

    const data = quizData[currentIdx];

    document.getElementById('question-text').innerText = data.q;
    document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} / ${quizData.length}`;
    document.getElementById('progress-fill').style.width =
        `${((currentIdx + 1) / quizData.length) * 100}%`;

    const container = document.getElementById('options-container');
    container.innerHTML = `
        <div class="option-btn" onclick="checkAnswer('A', this)">(A). ${data.a}</div>
        <div class="option-btn" onclick="checkAnswer('B', this)">(B). ${data.b}</div>
        <div class="option-btn" onclick="checkAnswer('C', this)">(C). ${data.c}</div>
        <div class="option-btn" onclick="checkAnswer('D', this)">(D). ${data.d}</div>
    `;

    startTimer();
}

// Timer
function startTimer() {
    clearInterval(timerId);

    document.getElementById('timer-display').innerText = timeLeft;
    document.getElementById('timer-display').style.borderColor = "var(--accent-primary)";

    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = timeLeft;
        tickSound.play().catch(() => {});

        if (timeLeft <= 5) {
            document.getElementById('timer-display').style.borderColor = "var(--wrong)";
        }

        if (timeLeft <= 0) {
            clearInterval(timerId);
            handleTimeout();
        }
    }, 1000);
}

// Check Answer
function checkAnswer(choice, btn) {
    if (!canAnswer) return;

    canAnswer = false;
    clearInterval(timerId);

    const correct = quizData[currentIdx].correct;
    const allBtns = document.querySelectorAll('.option-btn');

    if (choice === correct) {
        btn.classList.add('correct');
        score++;
        right++;
        correctSound.play().catch(() => {});
        document.getElementById('score-text').innerText = `Score : ${score}`;
    } else {
        btn.classList.add('wrong');
        wrong++;
        wrongSound.play().catch(() => {});
    }

    // Show correct answer
    allBtns.forEach(b => {
        if (b.innerText.startsWith(`(${correct})`) || b.innerText.startsWith(correct)) {
            b.classList.add('correct');
        }
    });

    document.getElementById('next-btn').style.visibility = 'visible';
}

// Timeout (Skipped)
function handleTimeout() {
    canAnswer = false;
    skipped++;

    const correct = quizData[currentIdx].correct;
    const allBtns = document.querySelectorAll('.option-btn');

    allBtns.forEach(b => {
        if (b.innerText.startsWith(`(${correct})`) || b.innerText.startsWith(correct)) {
            b.classList.add('correct');
        }
    });

    document.getElementById('next-btn').style.visibility = 'visible';
}

// Next Question
function nextQuestion() {
    currentIdx++;

    if (currentIdx < quizData.length) {
        showQuestion();
    } else {
        showResults();
    }
}

// Show Results
function showResults() {
    document.getElementById('quiz-main').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    
    // document.getElementById("urResult").innerText = `Your Result : `+`${right} / ${quizData.length}`;
    
    document.getElementById('total-count').innerText = quizData.length;
    document.getElementById('right-count').innerText = right;
    document.getElementById('wrong-count').innerText = wrong;
    document.getElementById('skip-count').innerText = skipped;

    const pct = Math.round((right / quizData.length) * 100);
    document.getElementById('percent-val').innerText = `Accuracy : `+`${pct}%`;
}

// Start
initQuiz();
</script>
</body>
</html>
